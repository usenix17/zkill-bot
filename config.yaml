# zkill-bot configuration

state_file_path: ./state.json
debug: false

# R2Z2 polling
r2z2_base_url: https://r2z2.zkillboard.com
poll_interval_ms: 100
poll_404_backoff_ms: 6000

# Action retries
retry_max_retries: 3
retry_base_backoff_ms: 250
retry_max_backoff_ms: 10000

# Observability — set alert_webhook_url to receive startup/shutdown pings
metrics_log_interval_ms: 60000
alert_webhook_url: ""

# Rules
rules:
  mode: first-match
  rules:
    - name: "high-value-kill"
      enabled: true
      priority: 10
      filter:
        zkb_value_min: 1000000000
      actions:
        - type: console
        - type: webhook
          args:
            url: "https://some-webhook"
            template: "default"

    - name: "capital-kill"
      enabled: true
      priority: 20
      filter:
        has_capital: true
      actions:
        - type: console
        - type: webhook
          args:
            url: "https://some-webhook"
            template: "capital"

    - name: "corp-loss"
      enabled: true
      priority: 30
      filter:
        victim_corporation_id: [98812444]
      actions:
        - type: console
        - type: webhook
          args:
            url: "https://some-webhook"
            template: "loss"

    - name: "solo-pvp"
      enabled: true
      priority: 40
      filter:
        and:
          - solo: true
          - npc: false
      actions:
        - type: console
        - type: webhook
          args:
            url: "https://some-webhook"
            template: "default"

    - name: "jita-trade-hub-kill"
      enabled: true
      priority: 50
      filter:
        and:
          - solar_system_name: ["Jita", "Amarr", "Dodixie", "Rens", "Hek"]
          - zkb_value_min: 500000000
          - npc: false
      actions:
        - type: console
        - type: webhook
          args:
            url: "https://some-webhook"
            template: "default"

    - name: "all-kills"
      enabled: false
      priority: 100
      filter:
        npc: false
      actions:
        - type: console
